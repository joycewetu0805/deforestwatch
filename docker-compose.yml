version: '3.8'

services:
  app:
    build: .
    container_name: deforestwatch-app
    ports:
      - "8000:8000"   # FastAPI
      - "8501:8501"   # Streamlit
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: deforestwatch-db
    environment:
      POSTGRES_DB: deforestwatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-deforestwatch_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
